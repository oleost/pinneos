name: Build and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 0.1.0)'
        required: true
        default: 'dev'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build ISO + IMG and compress for release
        working-directory: build
        run: make release VERSION=${{ steps.version.outputs.version }}

      - name: Upload artifacts (every run, 7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: pinneos-${{ steps.version.outputs.version }}
          path: release/
          retention-days: 7

      - name: Create GitHub release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release/pinneos-*.iso
            release/pinneos-*.img.gz
            release/pinneos-*.sha256
            release/pinneos-*.json

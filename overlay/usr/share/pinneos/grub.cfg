# PinneOS GRUB configuration
# Variables read from grubenv on the EFI partition (FAT32, always readable by GRUB):
#   boot_slot   = A or B
#   boot_tries  = 0..2 (auto-rollback after 2 failed attempts)

set default=0
set timeout=3

# At grub.cfg load time $root is PINNEOS_EFI (set by the embedded early config).
# FAT32 is always readable by GRUB — capture it before we change $root below.
set efi_part=$root

# Load environment from EFI partition
if [ -f ($efi_part)/grubenv ]; then
    load_env --file ($efi_part)/grubenv
fi

# USB role — presence of pinneos-backup flag means this stick is the backup/mirror.
# Primary USB has no such file (or pinneos-role contains "primary").
set usb_role=primary
if [ -f ($efi_part)/pinneos-backup ]; then
    set usb_role=backup
    set timeout=15
    echo ""
    echo "  *** BACKUP USB — primary USB not detected ***"
    echo "  Booting from backup. Check BIOS boot order if this is unexpected."
    echo ""
fi

# Auto-rollback: if this slot has failed twice, switch to the other
if [ "${boot_tries}" -ge 2 ]; then
    if [ "${boot_slot}" = "A" ]; then
        set boot_slot=B
    else
        set boot_slot=A
    fi
    set boot_tries=0
    save_env --file ($efi_part)/grubenv boot_slot boot_tries
fi

# Increment try counter (reset to 0 by pinneos-boot-success.service on successful boot)
set boot_tries=$(( boot_tries + 1 ))
save_env --file ($efi_part)/grubenv boot_tries

# Select slot partition
if [ "${boot_slot}" = "B" ]; then
    search --label --set=root PINNEOS_B
else
    search --label --set=root PINNEOS_A
fi

if [ "${usb_role}" = "backup" ]; then
    menuentry "PinneOS [BACKUP USB]" {
        linux  /vmlinuz archisobasedir=pinneos archisolabel=PINNEOS_${boot_slot} \
                        quiet loglevel=3 systemd.show_status=false \
                        pinneos.slot=${boot_slot} pinneos.usb_role=backup
        initrd /initramfs.img
    }
    menuentry "PinneOS [BACKUP USB] (verbose)" {
        linux  /vmlinuz archisobasedir=pinneos archisolabel=PINNEOS_${boot_slot} \
                        pinneos.slot=${boot_slot} pinneos.usb_role=backup
        initrd /initramfs.img
    }
else
    menuentry "PinneOS" {
        linux  /vmlinuz archisobasedir=pinneos archisolabel=PINNEOS_${boot_slot} \
                        quiet loglevel=3 systemd.show_status=false \
                        pinneos.slot=${boot_slot}
        initrd /initramfs.img
    }
    menuentry "PinneOS (verbose)" {
        linux  /vmlinuz archisobasedir=pinneos archisolabel=PINNEOS_${boot_slot} \
                        pinneos.slot=${boot_slot}
        initrd /initramfs.img
    }
fi

menuentry "Recovery shell" {
    linux  /vmlinuz archisobasedir=pinneos archisolabel=PINNEOS_${boot_slot} \
                    pinneos.recovery=1 systemd.unit=rescue.target
    initrd /initramfs.img
}

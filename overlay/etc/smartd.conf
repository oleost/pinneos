# PinneOS smartd configuration
# Monitor all disks that support SMART. Run short self-test weekly (Saturday 02:00),
# long self-test monthly (first Sunday 03:00). Log to syslog on any failure.
DEVICESCAN -a \
    -o on \
    -S on \
    -s (S/../../6/02|L/../../1/03) \
    -W 5,45,55 \
    -m root \
    -M exec /usr/lib/homelab/smart-alert.sh

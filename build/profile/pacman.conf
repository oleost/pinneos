# PinneOS pacman.conf — used by mkarchiso during image build

[options]
HoldPkg      = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5

SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# ZFS packages — zfs-dkms 2.4.1 (OpenZFS, Dec 2025) from archzfs experimental.
# Experimental GitHub release has full kernel 6.16+ support; no source patches needed.
# SigLevel Optional: avoids key-import step in build.sh.
[archzfs]
SigLevel = Optional TrustAll
Server = https://github.com/archzfs/archzfs/releases/download/experimental

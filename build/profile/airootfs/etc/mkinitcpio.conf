# PinneOS mkinitcpio configuration
# ZFS is NOT needed in the initramfs — pool import happens in userspace
# via pinneos-zfs-import.service after the live system is up.
# The standard archiso hooks handle live boot (squashfs + overlayfs).

MODULES=()
BINARIES=()
FILES=()
HOOKS=(base udev archiso block filesystems keyboard)

COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-9)

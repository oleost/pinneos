LABEL pinneos
TEXT HELP
Boot PinneOS on BIOS. ZFS pools on internal drives are imported automatically.
ENDTEXT
MENU LABEL PinneOS (BIOS)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% nomodeset

LABEL pinneos-verbose
TEXT HELP
Boot PinneOS with verbose kernel output for troubleshooting.
ENDTEXT
MENU LABEL PinneOS (verbose boot)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

LABEL recovery
TEXT HELP
Drop to a root shell. Useful for ZFS pool repair or manual recovery.
ENDTEXT
MENU LABEL PinneOS - recovery shell
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% systemd.unit=rescue.target

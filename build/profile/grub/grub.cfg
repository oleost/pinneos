# PinneOS GRUB config (live ISO)
# %INSTALL_DIR% and %ARCHISO_UUID% are replaced by mkarchiso at build time.

set default=0
set timeout=5

insmod all_video

menuentry "PinneOS" {
    set gfxpayload=keep
    linux  /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts \
               archisobasedir=%INSTALL_DIR% \
               archisosearchuuid=%ARCHISO_UUID% \
               nomodeset quiet loglevel=3 systemd.show_status=false
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
}

menuentry "PinneOS (verbose boot)" {
    set gfxpayload=keep
    linux  /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts \
               archisobasedir=%INSTALL_DIR% \
               archisosearchuuid=%ARCHISO_UUID%
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
}

menuentry "PinneOS — recovery shell" {
    set gfxpayload=keep
    linux  /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts \
               archisobasedir=%INSTALL_DIR% \
               archisosearchuuid=%ARCHISO_UUID% \
               systemd.unit=rescue.target
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
}
